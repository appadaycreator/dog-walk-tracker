    <meta name="theme-color" content="#7cb342"><title>使い方 - 犬の散歩記録アプリ</title><style>body{font-family:'Noto Sans JP',sans-serif;background:#0d2000;color:#f1f8e9;max-width:800px;margin:0 auto;padding:2rem 1rem;line-height:1.8}h1,h2{color:#aed581}ol{padding-left:1.5rem}li{margin-bottom:0.5rem}a{color:#aed581}</style></head><body><h1>使い方</h1><h2>散歩を記録する</h2><ol><li>「▶ 開始」で散歩タイマーをスタート</li><li>散歩後に「⏹ 停止」で時間が自動入力されます</li><li>距離・天気・気分などを入力して「散歩を記録する」をクリック</li><li>記録が履歴に保存されます（ブラウザに記録）</li></ol><h2>運動量チェック</h2><p>犬種を選ぶと過去7日間の散歩量と推奨量を比較できます。</p><p><a href="index.html">← トップへ戻る</a></p></body></html>
